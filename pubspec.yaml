name: artbeat
description: ARTbeat application for artists and art enthusiasts

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
    
  # Local packages
  artbeat_admin:
    path: packages/artbeat_admin
  artbeat_core:
    path: packages/artbeat_core
  artbeat_auth:
    path: packages/artbeat_auth
  artbeat_profile:
    path: packages/artbeat_profile
  artbeat_artwork:
    path: packages/artbeat_artwork
  artbeat_art_walk:
    path: packages/artbeat_art_walk
  artbeat_artist:
    path: packages/artbeat_artist
  artbeat_community:
    path: packages/artbeat_community
  artbeat_settings:
    path: packages/artbeat_settings
  artbeat_capture:
    path: packages/artbeat_capture
  artbeat_messaging:
    path: packages/artbeat_messaging

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^1.0.0
  photo_view: ^0.15.0
  cached_network_image: ^3.4.1

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.7
  firebase_analytics: ^11.5.0
  firebase_app_check: ^0.3.2+7
  firebase_messaging: ^15.2.7

  # Location Services
  geolocator: ^14.0.1
  geocoding: ^4.0.0
  google_maps_flutter: ^2.5.3

  # Utils
  device_info_plus: ^11.5.0
  share_plus: ^11.0.0
  intl: ^0.20.2
  google_mlkit_text_recognition: ^0.15.0

  # Media
  camera: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.0
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/default_profile.png
    - assets/event_placeholder.png
    - assets/logo.png
    - assets/triangle.png
    - assets/fonts/
    - assets/icons/
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700

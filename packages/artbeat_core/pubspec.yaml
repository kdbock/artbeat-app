name: artbeat_core
description: Core components for the ARTbeat application
version: 0.0.1
publish_to: 'none'
homepage: https://artbeat.app

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Environment configuration
  flutter_dotenv: ^5.1.0

  # Feature modules
  artbeat_art_walk:
    path: ../artbeat_art_walk
  artbeat_community:
    path: ../artbeat_community
  artbeat_artwork:
    path: ../artbeat_artwork
  artbeat_artist:
    path: ../artbeat_artist
  artbeat_settings:
    path: ../artbeat_settings
  artbeat_profile:
    path: ../artbeat_profile
  artbeat_auth:
    path: ../artbeat_auth

  # Firebase
  firebase_core: ^3.14.0
  firebase_analytics: ^11.5.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.9
  firebase_storage: ^12.4.7
  firebase_app_check: ^0.3.2+7

  # Location services
  geolocator: ^14.0.1
  geocoding: ^4.0.0

  # Payment processing
  flutter_stripe: ^11.1.0

  # Utils
  logging: ^1.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.0
  mockito: ^5.4.4
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
